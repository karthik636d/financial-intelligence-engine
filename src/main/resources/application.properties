spring.application.name=financialintelligence

server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/financial_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

alphavantage.api.key=${ALPHAVANTAGE_API_KEY}
alphavantage.base.url=https://www.alphavantage.co/query

news.api.key=${NEWS_API_KEY:YOUR_NEWS_API_KEY}
news.base.url=https://newsapi.org/v2

gemini.api.key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY}